<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're on the list — Tech Nephew</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;600;700&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        .success-page {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--cream);
            padding: 4rem 0;
        }

        .success-icon {
            width: 72px;
            height: 72px;
            background: var(--green-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .success-icon svg {
            width: 36px;
            height: 36px;
            color: var(--white);
        }

        .success-page h1 {
            font-size: 2rem;
            color: var(--green-dark);
            margin-bottom: 0.75rem;
        }

        .success-page p {
            font-size: 1.1rem;
            color: var(--charcoal);
            margin-bottom: 2rem;
            max-width: 420px;
            margin-left: auto;
            margin-right: auto;
        }

        .back-link {
            color: var(--green-primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <section class="success-page">
        <div class="container">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                </svg>
            </div>
            <h1>You're on the list.</h1>
            <p>I'll be in touch when new sessions open up. No spam — just useful things, when there's something worth saying.</p>
            <a href="/" class="back-link">← Back to Tech Nephew</a>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="/scripts/footer.js"></script>

</body>

</html>
